<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Plano de Vida" />
    <meta name="theme-color" content="#FFFFFF" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/planoflife/favicon.svg" />
    <link rel="apple-touch-icon" href="/planoflife/apple-touch-icon.png" />

    <title>Plano de Vida</title>
    <script>
      ;(function() {
        var m = localStorage.getItem('theme-mode')
        if (!m) m = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'black' : 'light'
        if (m === 'dark' || m === 'black') document.documentElement.classList.add(m)
        var c = m === 'dark' ? '#13161B' : m === 'black' ? '#000000' : '#FFFFFF'
        document.querySelector('meta[name="theme-color"]').setAttribute('content', c)

        window.__setThemedFavicon = function(mode) {
          var isDark = mode === 'dark' || mode === 'black'
          var bg = isDark ? '#1a1a1a' : '#FFFFFF'
          var fg = isDark ? '#FFFFFF' : '#1a1a1a'
          var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">'
            + '<rect width="512" height="512" rx="96" fill="' + bg + '"/>'
            + '<g transform="translate(256,256) scale(0.65)">'
            + '<path d="m-1,-244a244,244 0 1,0 2,0z M0,-249V244 M-212,-123H212" fill="none" stroke="' + fg + '" stroke-width="14"/>'
            + '</g></svg>'
          var url = 'data:image/svg+xml,' + encodeURIComponent(svg)
          var link = document.querySelector('link[rel="icon"]')
          if (link) link.setAttribute('href', url)
        }
        window.__setThemedFavicon(m)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
